<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Idle Ecologist">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="manifest" href="manifest.json">
  <title>Idle Ecologist</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="sticky-top">
    <header id="header"></header>
  </div>
  <main id="content"></main>
  <nav id="tab-bar">
    <div id="tab-buttons" aria-label="Primary navigation"></div>
    <div id="notif-wrap">
      <button id="notif-btn" aria-label="View notifications">🔔</button>
      <span id="notif-badge"></span>
    </div>
    <div id="notif-modal" hidden>
      <div id="notif-backdrop"></div>
      <div id="notif-panel">
        <div id="notif-header">
          <span id="notif-title">🔔 Notifications</span>
          <div id="notif-header-actions">
            <button id="notif-close" aria-label="Close">×</button>
          </div>
        </div>
        <div id="notif-tabs">
          <button id="notif-tab-unread" class="notif-tab active">Unread</button>
          <button id="notif-tab-read" class="notif-tab">Read</button>
        </div>
        <div id="notif-list"></div>
      </div>
    </div>
  </nav>
  <script type="module" src="main.js"></script>
</body>
</html>
